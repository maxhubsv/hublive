# HubLive Server connection
hublive:
  url: "ws://103.89.94.96:7880"
  api_key: "devkey"
  api_secret: "secret"

# Room settings
room:
  name: "screen-share"

# Agent identity
agent:
  identity: "agent-cpp-001"
  name: "Screen Agent C++"

# Screen capture settings
capture:
  fps: 15
  # "all" for all monitors, or 1, 2, 3... for specific monitor
  monitor: all
  scale: 1.0

# Audio settings
audio:
  system_enabled: true
  mic_enabled: true
  system_gain: 0.8
  mic_gain: 1.0

# Remote control settings
control:
  enabled: true
  mouse: true
  keyboard: true
